<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Secret To-Do</title>
  <script>
    // GitHub Pages SPA redirect trick
    // Converts 404 path into a query param so index.html can redirect back
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + 1).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(1).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
